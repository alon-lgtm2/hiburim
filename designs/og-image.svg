<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="50%" style="stop-color:#c4694a"/>
      <stop offset="100%" style="stop-color:#7b4b94"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="120" fill="#1a6b6a" opacity="0.15"/>
  <circle cx="1050" cy="350" r="80" fill="#c4694a" opacity="0.12"/>
  <circle cx="200" cy="500" r="100" fill="#5c7a4a" opacity="0.1"/>
  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="url(#accent)">חיבורים</text>
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#e0e0e0">קהילת מטפלים ומטפלות בעברית</text>
  <!-- Description -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#888888">10 קונספטים לעיצוב האתר</text>
  <!-- Divider line -->
  <rect x="450" y="440" width="300" height="2" fill="url(#accent)" opacity="0.5"/>
  <!-- Bottom text -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#555555">הוכחת התכנות | Proof of Concept</text>
  <!-- Bottom gradient bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
