<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm paper background -->
  <rect width="64" height="64" rx="14" fill="#f8f3eb"/>
  <!-- Subtle ruled lines -->
  <line x1="8" y1="24" x2="56" y2="24" stroke="rgba(160,145,120,0.2)" stroke-width="1"/>
  <line x1="8" y1="34" x2="56" y2="34" stroke="rgba(160,145,120,0.2)" stroke-width="1"/>
  <line x1="8" y1="44" x2="56" y2="44" stroke="rgba(160,145,120,0.2)" stroke-width="1"/>
  <!-- Coral margin line (right, RTL) -->
  <line x1="52" y1="8" x2="52" y2="56" stroke="rgba(196,105,74,0.35)" stroke-width="1.5"/>
  <!-- Hebrew ט -->
  <text x="32" y="44" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32" font-weight="700"
    fill="#2d2a26">ט</text>
</svg>
