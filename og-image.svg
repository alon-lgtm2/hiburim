<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f3eb"/>
      <stop offset="100%" style="stop-color:#f0e8d8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4694a"/>
      <stop offset="50%" style="stop-color:#d4884a"/>
      <stop offset="100%" style="stop-color:#8a6a4a"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4694a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c4694a;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="url(#warmGrad)"/>

  <!-- Subtle paper texture overlay -->
  <rect width="1200" height="630" fill="none" opacity="0.03"
    style="filter: url(#noise)"/>

  <!-- Ruled lines (horizontal) -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="132" x2="1200" y2="132" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="164" x2="1200" y2="164" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="196" x2="1200" y2="196" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="228" x2="1200" y2="228" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="260" x2="1200" y2="260" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="292" x2="1200" y2="292" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="324" x2="1200" y2="324" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="356" x2="1200" y2="356" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="388" x2="1200" y2="388" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="452" x2="1200" y2="452" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="484" x2="1200" y2="484" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="516" x2="1200" y2="516" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="548" x2="1200" y2="548" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="rgba(160,145,120,0.15)" stroke-width="1"/>

  <!-- Margin line (right side - RTL) -->
  <line x1="1112" y1="0" x2="1112" y2="630" stroke="rgba(196,105,74,0.22)" stroke-width="2"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentGrad)"/>

  <!-- "Draft" stamp top-left -->
  <text x="60" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="13"
    fill="rgba(160,130,100,0.55)" letter-spacing="3">draft · april 2026</text>

  <!-- Main content area -->

  <!-- Handwritten-style small label -->
  <text x="600" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="16"
    fill="rgba(180,140,110,0.7)" letter-spacing="1">הצעה מקצועית</text>

  <!-- Main title - big and bold -->
  <text x="600" y="272" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
    font-size="82" font-weight="700" fill="#2d2a26" letter-spacing="-1">טיפול קשוב</text>

  <!-- Coral underline accent -->
  <rect x="430" y="288" width="340" height="3" rx="2" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
    font-size="28" fill="#5a5040">הצעה לבניית אתר קהילת המטפלים</text>
  <text x="600" y="388" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
    font-size="28" fill="#5a5040">והמטפלות בעברית</text>

  <!-- Divider -->
  <line x1="420" y1="420" x2="780" y2="420" stroke="rgba(160,130,100,0.3)" stroke-width="1"/>

  <!-- Feature tags row -->
  <rect x="199" y="440" width="168" height="36" rx="18" fill="url(#tagGrad)" stroke="rgba(196,105,74,0.2)" stroke-width="1"/>
  <text x="283" y="463" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#8a5a40">10 עיצובים מוכנים</text>

  <rect x="384" y="440" width="148" height="36" rx="18" fill="url(#tagGrad)" stroke="rgba(196,105,74,0.2)" stroke-width="1"/>
  <text x="458" y="463" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#8a5a40">CMS עצמאי</text>

  <rect x="549" y="440" width="168" height="36" rx="18" fill="url(#tagGrad)" stroke="rgba(196,105,74,0.2)" stroke-width="1"/>
  <text x="633" y="463" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#8a5a40">בעלות מלאה על הקוד</text>

  <rect x="734" y="440" width="148" height="36" rx="18" fill="url(#tagGrad)" stroke="rgba(196,105,74,0.2)" stroke-width="1"/>
  <text x="808" y="463" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#8a5a40">SEO + AEO</text>

  <!-- Author line -->
  <text x="600" y="550" text-anchor="middle" font-family="Georgia, serif" font-size="16"
    fill="rgba(130,110,90,0.65)">אלון גילדוני — מפתח אתרים</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Decorative corner hole-punch circles -->
  <circle cx="40" cy="90" r="12" fill="rgba(160,130,100,0.08)" stroke="rgba(160,130,100,0.15)" stroke-width="1"/>
  <circle cx="40" cy="315" r="12" fill="rgba(160,130,100,0.08)" stroke="rgba(160,130,100,0.15)" stroke-width="1"/>
  <circle cx="40" cy="540" r="12" fill="rgba(160,130,100,0.08)" stroke="rgba(160,130,100,0.15)" stroke-width="1"/>
</svg>
